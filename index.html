<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎯 5000 لغز عربي · غرف مباشرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; font-family: 'Cairo', sans-serif; color: white; min-height: 100vh; padding: 16px 12px; }
    .app { max-width: 480px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ff1a1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .banned-message { background: #550000; border: 2px solid #ff0000; border-radius: 20px; padding: 30px; text-align: center; }
    .mini-leaderboard { background: #1a1a1a; border-radius: 20px; padding: 12px 16px; margin-bottom: 20px; border: 1px solid #333; }
    .mini-leaderboard .title { display: flex; justify-content: space-between; color: #ff4444; font-weight: 700; }
    .mini-leaderboard .players { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .player-chip { background: #222; padding: 6px 14px; border-radius: 30px; display: flex; align-items: center; gap: 6px; }
    .card { background: #151515; border-radius: 24px; padding: 20px; border: 1px solid #2a2a2a; margin-bottom: 16px; }
    .card.primary { background: linear-gradient(135deg, #1a0a0a, #150505); border-color: #ff3333; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .btn { background: #222; border: 1px solid #444; color: white; padding: 16px 20px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; width: 100%; font-family: 'Cairo', sans-serif; margin: 6px 0; }
    .btn-primary { background: #e60000; border-color: #ff3333; box-shadow: 0 4px 15px rgba(230,0,0,0.3); }
    .btn-primary:active { background: #cc0000; transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; }
    .input-group { display: flex; gap: 8px; }
    .input-group input { flex: 1; background: #0a0a0a; border: 1px solid #444; border-radius: 14px; padding: 14px 16px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .questions-preview { margin-top: 20px; max-height: 200px; overflow-y: auto; }
    .preview-item { background: #1a1a1a; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .preview-cat { padding: 4px 10px; border-radius: 20px; font-size: 11px; background: #2a0000; color: #ff9999; }
    .game-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .round-badge { background: #1a1a1a; padding: 8px 16px; border-radius: 30px; border: 1px solid #333; }
    .score-badge { background: #ff1a1a; padding: 8px 16px; border-radius: 30px; font-weight: 700; }
    .progress-bar { height: 8px; background: #1a1a1a; border-radius: 10px; margin: 16px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #ff1a1a; width: 100%; }
    .question-box { background: #151515; border-radius: 24px; padding: 24px 20px; margin: 20px 0; border: 1px solid #2a2a2a; text-align: center; }
    .question-text { font-size: 20px; font-weight: 700; line-height: 1.5; }
    .answers { display: grid; gap: 12px; margin: 20px 0; }
    .answer-btn { background: #1a1a1a; border: 1.5px solid #333; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; color: white; text-align: center; cursor: pointer; }
    .answer-btn.correct { background: #00a86b; border-color: #00ff88; }
    .answer-btn.wrong { background: #8b0000; border-color: #ff4444; }
    .answer-btn:disabled { opacity: 0.6; pointer-events: none; }
    .players-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .player-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
    .status-message { color: #ffaa00; font-size: 14px; margin-top: 12px; text-align: center; }
    .end-stats { background: #1a1a1a; border-radius: 20px; padding: 20px; margin: 20px 0; text-align: center; }
    .final-score { font-size: 48px; font-weight: 900; color: #ff4444; }
    .slider-item { margin: 20px 0; }
    .slider-item label { display: flex; justify-content: space-between; margin-bottom: 8px; }
    input[type="range"] { width: 100%; accent-color: #ff1a1a; height: 6px; }
    .room-info { background: #1a0000; border-radius: 16px; padding: 12px; margin: 15px 0; border: 1px solid #ff4444; }
    .waiting-screen { text-align: center; padding: 40px 20px; }
    .spinner { width: 50px; height: 50px; border: 4px solid #333; border-top-color: #ff4444; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .finished-player { display: inline-block; background: #1a3a1a; border: 1px solid #00aa00; border-radius: 20px; padding: 5px 15px; margin: 5px; }
  </style>
</head>
<body>
<div class="app">
  <div class="mini-leaderboard" id="miniLeaderboard">
    <div class="title"><span>🏆 المتصدرون</span><span id="playerCount">👤 0</span></div>
    <div class="players" id="miniPlayersList"></div>
  </div>

  <!-- شاشة الحظر -->
  <div id="bannedScreen" class="screen">
    <div class="banned-message">
      <h2 style="color:#ff4444; margin-bottom:20px;">🚫 تم حظرك</h2>
      <p>عذراً، لقد تم حظرك من قبل المشرف ولا يمكنك المشاركة حالياً.</p>
    </div>
  </div>

  <!-- شاشة البداية -->
  <div id="homeScreen" class="screen active">
    <div class="header"><h1>🎯 5000 لغز عربي</h1></div>
    <p style="color:#888; margin-bottom:20px;">غرف مباشرة · تحدي جماعي</p>
    
    <!-- عرض الأسئلة الموجودة (للقراءة فقط) -->
    <div class="card">
      <div class="card-title">📚 الأسئلة المتاحة حالياً</div>
      <div id="questionsPreviewList" class="questions-preview">
        <p style="color:#aaa; text-align:center;">جاري تحميل الأسئلة...</p>
      </div>
    </div>
    
    <div class="card primary"><div class="card-title">✨ إنشاء غرفة جديدة</div><button class="btn btn-primary" id="homeCreateBtn">🎮 إنشاء غرفة</button></div>
    <div class="card"><div class="card-title">🔑 الانضمام إلى غرفة</div><div class="input-group"><input type="text" id="homeRoomInput" placeholder="أدخل رمز الغرفة"><button class="btn btn-primary" id="homeJoinBtn">دخول</button></div></div>
  </div>

  <!-- باقي الشاشات (الإعدادات، اللوبي، اللعب، الانتظار، النهاية) - نفس السابق -->
  <!-- ... -->
</div>

<script>
  // ==================== Firebase ====================
  firebase.initializeApp({apiKey:"AIzaSyBKs24sqojKX51Q4HAPv3amY1oTGo3YcyA",authDomain:"myquiz-314f9.firebaseapp.com",databaseURL:"https://myquiz-314f9-default-rtdb.firebaseio.com",projectId:"myquiz-314f9",storageBucket:"myquiz-314f9.firebasestorage.app",messagingSenderId:"86590365416",appId:"1:86590365416:web:0d37b3695ec028103ff35d"});
  const db = firebase.database();
  
  let questionsBank = [];
  let playerId = '';
  let deviceInfo = { type: 'mobile', device: '📱' };
  
  // كشف نوع الجهاز
  function detectDevice() {
    const ua = navigator.userAgent;
    if(/iPad|iPhone|iPod/.test(ua)) deviceInfo = { type: 'ios', device: '📱' };
    else if(/Android/.test(ua)) deviceInfo = { type: 'android', device: '📱' };
    else deviceInfo = { type: 'desktop', device: '💻' };
  }
  detectDevice();
  
  // تحميل الأسئلة من Firebase وعرضها (للقراءة فقط)
  function loadQuestionsPreview() {
    db.ref('questions').on('value', snapshot => {
      const data = snapshot.val();
      if(data) {
        questionsBank = Object.values(data);
        displayQuestionsPreview();
      } else {
        questionsBank = [];
        displayQuestionsPreview();
      }
    });
  }
  
  function displayQuestionsPreview() {
    const container = document.getElementById('questionsPreviewList');
    const preview = questionsBank.slice(0, 5);
    container.innerHTML = preview.map(q => `
      <div class="preview-item">
        <span class="preview-cat">${q.cat || 'متنوع'}</span>
        <span style="flex:1;">${q.q?.substring(0, 40)}${q.q?.length > 40 ? '...' : ''}</span>
      </div>
    `).join('');
    if(questionsBank.length > 5) {
      container.innerHTML += `<p style="color:#aaa; text-align:center; margin-top:10px;">و ${questionsBank.length - 5} سؤال آخر...</p>`;
    }
    if(questionsBank.length === 0) {
      container.innerHTML = '<p style="color:#aaa; text-align:center;">لا توجد أسئلة حالياً</p>';
    }
  }
  
  // التحقق من الحظر
  function checkBanned(pid) {
    db.ref(`banned/${pid}`).on('value', snapshot => {
      if(snapshot.exists()) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('bannedScreen').classList.add('active');
      }
    });
  }
  
  // الإعدادات الحية
  db.ref('settings/live').on('value', snapshot => {
    const live = snapshot.val();
    if(live && typeof updateLiveSettings === 'function') {
      updateLiveSettings(live);
    }
  });
  
  loadQuestionsPreview();
  
  // ... باقي منطق اللعبة (نفس السابق مع إضافة deviceInfo عند تسجيل اللاعب)
</script>
</body>
</html>
